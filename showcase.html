    <style>
        .construction-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .construction-icon {
            font-size: 5rem;
            color: #f0ad4e;
            margin-bottom: 1.5rem;
        }
        .construction-title {
            font-family: 'Raleway', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 1rem;
        }
        .construction-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            color: #aaa;
            max-width: 500px;
            margin-bottom: 2rem;
        }
        .construction-btn {
            font-family: 'Raleway', sans-serif;
            font-weight: 600;
            padding: 0.75rem 2rem;
            border: 2px solid #f0ad4e;
            color: #f0ad4e;
            background: transparent;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .construction-btn:hover {
            background: #f0ad4e;
            color: #1D2021;
            text-decoration: none;
        }
        .construction-divider {
            width: 80px;
            height: 3px;
            background: #f0ad4e;
            margin: 0 auto 1.5rem;
            border: none;
        }
    </style>
